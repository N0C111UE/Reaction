<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

  :root {
    --bg: #f5f4f0;
    --surface: #eceae4;
    --surface2: #e2e0d8;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9e99;
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --red: #E24B4A;
    --amber: #BA7517;
    --yellow-light: #FFF3CD;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
      --text: #f0ede6;
      --text2: #a0a09a;
      --text3: #6a6a65;
    }
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  .header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }

  .title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .title span {
    color: var(--green);
  }

  #round-indicator {
    font-size: 13px;
    color: var(--text2);
    font-family: 'Space Mono', monospace;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 1.25rem;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    text-align: center;
    border: 0.5px solid var(--border);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.best { color: var(--green); }

  /* === ARENA === */
  .arena {
    border-radius: var(--radius-xl);
    border: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    min-height: 280px;
    position: relative;
    overflow: hidden;
    transition: background 0.12s, border-color 0.12s;
    padding: 2rem;
    text-align: center;
  }

  .arena.waiting  { background: var(--surface); }
  .arena.ready    { background: #c0392b; border-color: transparent; }
  .arena.go       { background: var(--green); border-color: transparent; }
  .arena.early    { background: var(--amber); border-color: transparent; }
  .arena.result   { background: var(--surface); }
  .arena.done     { background: var(--surface); }

  .arena-icon {
    font-size: 52px;
    margin-bottom: 14px;
    line-height: 1;
  }

  .arena-msg {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .arena.go .arena-msg,
  .arena.ready .arena-msg,
  .arena.early .arena-msg { color: #fff; }

  .arena.go .arena-sub,
  .arena.ready .arena-sub,
  .arena.early .arena-sub { color: rgba(255,255,255,0.78); }

  .arena-sub {
    font-size: 14px;
    color: var(--text2);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  .big-time {
    font-family: 'Space Mono', monospace;
    font-size: 54px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 4px;
  }

  /* === HISTORY BARS === */
  .history-row {
    display: flex;
    gap: 5px;
    margin-top: 1rem;
    align-items: flex-end;
    height: 52px;
  }

  .history-bar {
    flex: 1;
    border-radius: 3px;
    min-height: 4px;
    transition: height 0.3s ease;
    cursor: default;
  }

  /* === BUTTONS === */
  .bottom-row {
    display: flex;
    gap: 8px;
    margin-top: 0.75rem;
  }

  .btn {
    flex: 1;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
    border-radius: var(--radius-md);
    padding: 11px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.13s, transform 0.08s;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }

  .btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: transparent;
  }

  .btn.primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* === LEADERBOARD === */
  .leaderboard {
    margin-top: 1.5rem;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .lb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
    font-weight: 700;
  }

  .lb-header span { color: var(--text2); font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400; }

  .lb-row {
    display: grid;
    grid-template-columns: 28px 1fr 80px 80px;
    gap: 8px;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }

  .lb-row:last-child { border-bottom: none; }
  .lb-row.new-entry { background: var(--green-light); }

  @media (prefers-color-scheme: dark) {
    .lb-row.new-entry { background: rgba(29,158,117,0.15); }
  }

  .lb-rank { font-family: 'Space Mono', monospace; color: var(--text3); font-size: 12px; }
  .lb-date { color: var(--text2); font-family: 'Space Mono', monospace; font-size: 11px; }
  .lb-score { font-family: 'Space Mono', monospace; font-weight: 700; text-align: right; }
  .lb-avg { font-family: 'Space Mono', monospace; color: var(--text2); font-size: 12px; text-align: right; }

  .no-sessions {
    padding: 1.5rem;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
  }

  .footer {
    margin-top: 1rem;
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">Reaction<span>.</span>Trainer</div>
    <div id="round-indicator">round 0/10</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">last</div>
      <div class="stat-value" id="stat-last">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">avg</div>
      <div class="stat-value" id="stat-avg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">best</div>
      <div class="stat-value best" id="stat-best">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">total</div>
      <div class="stat-value" id="stat-score">0</div>
    </div>
  </div>

  <div class="arena waiting" id="arena" onclick="handleClick()">
    <div class="arena-icon" id="arena-icon">⚡</div>
    <div class="arena-msg" id="arena-msg">Click to start</div>
    <div class="arena-sub" id="arena-sub">10 rounds · click when green</div>
  </div>

  <div class="history-row" id="history-row"></div>

  <div class="bottom-row">
    <button class="btn" onclick="resetGame(true)">Reset</button>
    <button class="btn primary" id="action-btn" onclick="handleClick()">Start</button>
  </div>

  <div class="leaderboard" id="leaderboard">
    <div class="lb-header">
      Past sessions <span>lower ms = better</span>
    </div>
    <div id="lb-body"><div class="no-sessions">no sessions yet — play a full round!</div></div>
  </div>

  <div class="footer">press space bar to click · data saved in your browser</div>
</div>

<script>
const MAX_ROUNDS = 10;
let state = 'idle';
let goTimer = null;
let startTime = null;
let results = [];
let round = 0;
let score = 0;
let newEntryIndex = -1;

const arena = document.getElementById('arena');
const arenaMsg = document.getElementById('arena-msg');
const arenaSub = document.getElementById('arena-sub');
const arenaIcon = document.getElementById('arena-icon');
const statLast = document.getElementById('stat-last');
const statAvg = document.getElementById('stat-avg');
const statBest = document.getElementById('stat-best');
const statScore = document.getElementById('stat-score');
const roundInd = document.getElementById('round-indicator');
const histRow = document.getElementById('history-row');
const actionBtn = document.getElementById('action-btn');
const lbBody = document.getElementById('lb-body');

// Spacebar support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    handleClick();
  }
});

function getRating(ms) {
  if (ms < 150) return 'inhuman';
  if (ms < 200) return 'elite';
  if (ms < 250) return 'great';
  if (ms < 300) return 'good';
  if (ms < 400) return 'average';
  if (ms < 500) return 'slow';
  return 'very slow';
}

function setArena(cls, icon, msg, sub) {
  arena.className = 'arena ' + cls;
  arenaIcon.textContent = icon;
  arenaMsg.innerHTML = msg;
  arenaSub.textContent = sub;
}

function handleClick() {
  if (state === 'idle' || state === 'done') { resetGame(false); startRound(); return; }
  if (state === 'waiting' || state === 'ready') {
    clearTimeout(goTimer);
    state = 'early';
    setArena('early', '⚠️', 'Too early!', 'wait for green · click to retry');
    actionBtn.textContent = 'Retry';
    actionBtn.disabled = false;
    return;
  }
  if (state === 'go') {
    const ms = Date.now() - startTime;
    clearTimeout(goTimer);
    recordResult(ms);
    return;
  }
  if (state === 'early' || state === 'result') {
    startRound();
  }
}

function startRound() {
  if (round >= MAX_ROUNDS) { showDone(); return; }
  state = 'waiting';
  setArena('waiting', '👁', 'Get ready...', 'wait for green, then click!');
  actionBtn.textContent = 'Waiting...';
  actionBtn.disabled = true;

  const delay = 1000 + Math.random() * 2000;
  goTimer = setTimeout(() => {
    state = 'go';
    startTime = Date.now();
    setArena('go', '🟢', 'CLICK NOW!', '');
    actionBtn.textContent = 'Click!';
    actionBtn.disabled = false;
    goTimer = setTimeout(() => {
      if (state === 'go') recordResult(2000);
    }, 2000);
  }, delay);
}

function recordResult(ms) {
  state = 'result';
  round++;
  const clamped = Math.min(ms, 2000);
  results.push(clamped);

  const rating = getRating(clamped);
  score += clamped;

  const avg = Math.round(results.reduce((a,b) => a+b, 0) / results.length);
  const best = Math.min(...results);

  statLast.textContent = clamped + 'ms';
  statAvg.textContent = avg + 'ms';
  statBest.textContent = best + 'ms';
  statScore.textContent = score + 'ms';
  roundInd.textContent = `round ${round}/${MAX_ROUNDS}`;

  if (clamped >= 2000) {
    setArena('result', '⏱', 'Too slow!', `+2000ms penalty · click for next`);
  } else {
    setArena('result', '✓',
      `<span style="font-family:'Space Mono',monospace;font-size:48px;font-weight:700;letter-spacing:-2px">${clamped}ms</span>`,
      `${rating} · click for next`
    );
  }

  updateHistory();

  if (round >= MAX_ROUNDS) {
    actionBtn.textContent = 'See results';
    setTimeout(showDone, 1000);
  } else {
    actionBtn.textContent = 'Next round';
  }
  actionBtn.disabled = false;
}

function updateHistory() {
  const max = Math.max(...results, 600);
  histRow.innerHTML = results.map(r => {
    const pct = Math.max(8, Math.round((r / max) * 100));
    const color = r < 200 ? '#1D9E75' : r < 300 ? '#639922' : r < 400 ? '#BA7517' : '#E24B4A';
    return `<div class="history-bar" style="height:${pct}%;background:${color}" title="${r}ms"></div>`;
  }).join('');
}

let pendingSession = null;

function showDone() {
  state = 'done';
  const avg = Math.round(results.reduce((a,b) => a+b, 0) / results.length);
  const best = Math.min(...results);
  const rating = getRating(avg);
  if (pendingSession) {
    saveSession(pendingSession.score, pendingSession.avg, pendingSession.best);
  }
  pendingSession = { score, avg, best };
  setArena('done', '🏁',
    `Done! ${score}ms total`,
    `avg ${avg}ms · best ${best}ms · ${rating}`
  );
  actionBtn.textContent = 'Play again';
  actionBtn.disabled = false;
}

function resetGame(savePending) {
  if (savePending && pendingSession) {
    saveSession(pendingSession.score, pendingSession.avg, pendingSession.best);
  }
  pendingSession = null;
  clearTimeout(goTimer);
  state = 'idle';
  results = [];
  round = 0;
  score = 0;
  statLast.textContent = '—';
  statAvg.textContent = '—';
  statBest.textContent = '—';
  statScore.textContent = '0ms';
  roundInd.textContent = 'round 0/10';
  histRow.innerHTML = '';
  newEntryIndex = -1;
  setArena('waiting', '⚡', 'Click to start', '10 rounds · click when green');
  actionBtn.textContent = 'Start';
  actionBtn.disabled = false;
}

// === LOCAL STORAGE LEADERBOARD ===
function getSessions() {
  try {
    return JSON.parse(localStorage.getItem('rt_sessions') || '[]');
  } catch { return []; }
}

function saveSession(score, avg, best) {
  const sessions = getSessions();
  const entry = {
    score,
    avg,
    best,
    date: new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short' })
  };
  sessions.push(entry);
  sessions.sort((a, b) => a.score - b.score);
  if (sessions.length > 10) sessions.pop();
  newEntryIndex = sessions.findIndex(s => s === entry);
  // Re-find after sort
  newEntryIndex = sessions.findIndex(s => s.score === score && s.avg === avg && s.date === entry.date);
  localStorage.setItem('rt_sessions', JSON.stringify(sessions));
  renderLeaderboard();
}

function renderLeaderboard() {
  const sessions = getSessions();
  if (!sessions.length) {
    lbBody.innerHTML = '<div class="no-sessions">no sessions yet — play a full round!</div>';
    return;
  }
  lbBody.innerHTML = sessions.map((s, i) => `
    <div class="lb-row${i === newEntryIndex ? ' new-entry' : ''}">
      <div class="lb-rank">#${i+1}</div>
      <div class="lb-date">${s.date}</div>
      <div class="lb-score">${s.score}ms</div>
      <div class="lb-avg">${s.avg}ms avg</div>
    </div>
  `).join('');
}

function clearLeaderboard() {
  localStorage.removeItem('rt_sessions');
  newEntryIndex = -1;
  renderLeaderboard();
}

// Init
renderLeaderboard();
</script>
</body>
</html>
